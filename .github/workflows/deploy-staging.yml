name: Deploy Staging

on:
  workflow_dispatch:
  push:
    branches: [staging]

concurrency:
  group: deploy-staging-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  packages: write

jobs:
  build-api-image:
    name: Build API Docker image
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set image name
        id: meta
        run: |
          OWNER=$(echo '${{ github.repository_owner }}' | tr '[:upper:]' '[:lower:]')
          REPO=$(echo '${{ github.event.repository.name }}' | tr '[:upper:]' '[:lower:]')
          echo "image=ghcr.io/${OWNER}/${REPO}/api" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push staging image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: apps/api/Dockerfile
          push: true
          tags: |
            ${{ steps.meta.outputs.image }}:staging
            ${{ steps.meta.outputs.image }}:sha-${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy-api-render:
    name: Trigger Render deploy hook
    needs: build-api-image
    runs-on: ubuntu-latest
    steps:
      - name: Call Render deploy hook (optional)
        env:
          HOOK: ${{ secrets.RENDER_DEPLOY_HOOK_URL }}
        run: |
          if [ -z "$HOOK" ]; then
            echo "RENDER_DEPLOY_HOOK_URL not set — skipping Render trigger"
            echo "Connect the Blueprint in Render, or add the Deploy Hook secret."
            exit 0
          fi
          curl -fsS -X POST "$HOOK"
          echo "Render deploy hook invoked"

  deploy-web-vercel:
    name: Deploy web to Vercel (staging)
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Deploy to Vercel (optional)
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
        run: |
          if [ -z "$VERCEL_TOKEN" ] || [ -z "$VERCEL_ORG_ID" ] || [ -z "$VERCEL_PROJECT_ID" ]; then
            echo "Vercel secrets not fully configured — skipping web deploy"
            echo "Set VERCEL_TOKEN, VERCEL_ORG_ID, VERCEL_PROJECT_ID (see docs/STAGING.md)"
            exit 0
          fi
          npm install -g vercel@41
          cd apps/web
          vercel pull --yes --environment=preview --token="$VERCEL_TOKEN"
          vercel build --token="$VERCEL_TOKEN"
          vercel deploy --prebuilt --token="$VERCEL_TOKEN"
